name: Build ESPN Credential Extractor Binaries

# Put this file at .github/workflows/build-exe.yml in your repo,
# alongside get_espn_credentials.py in the repo root.
#
# Trigger it manually from the Actions tab ("Run workflow"), or it'll
# run automatically whenever get_espn_credentials.py changes.
#
# Builds a native binary on Windows, macOS, and Linux runners (PyInstaller
# doesn't cross-compile, so each OS has to build its own copy), then
# publishes all three to a single GitHub Release tagged "latest".

on:
  workflow_dispatch:
  push:
    paths:
      - 'get_espn_credentials.py'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            asset_name: get_espn_credentials-windows.exe
            build_path: dist/get_espn_credentials.exe
          - os: macos-latest
            asset_name: get_espn_credentials-macos
            build_path: dist/get_espn_credentials
          - os: ubuntu-latest
            asset_name: get_espn_credentials-linux
            build_path: dist/get_espn_credentials

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller browser-cookie3

      - name: Build binary
        run: pyinstaller --onefile --console --name get_espn_credentials get_espn_credentials.py

      - name: Rename binary for this OS
        shell: bash
        run: cp "${{ matrix.build_path }}" "${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

      - name: Publish to latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          files: ${{ matrix.asset_name }}
